{% extends "base.html" %}
{% block nav %}{% endblock %}
{% block title %}Register — light-sentry{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
  <div class="w-full max-w-sm rounded-lg border border-border bg-card p-6 shadow-sm">
    <h2 class="text-lg font-semibold text-foreground mb-4">Register</h2>
    {% match error %}
      {% when Some with (msg) %}
      <div class="mb-4 rounded-md bg-red-900/50 border border-red-400/20 px-4 py-3 text-sm text-red-400">{{ msg }}</div>
      {% when None %}
    {% endmatch %}
    <form method="post" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-foreground mb-1.5" for="email">Email</label>
        <input type="email" name="email" id="email" required class="w-full h-9 rounded-md border border-input bg-transparent px-3 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring" />
      </div>
      <div>
        <label class="block text-sm font-medium text-foreground mb-1.5" for="password">Password</label>
        <input type="password" name="password" id="password" required minlength="8" class="w-full h-9 rounded-md border border-input bg-transparent px-3 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring" />
      </div>
      <button type="submit" class="w-full h-9 rounded-md bg-primary text-primary-foreground text-sm font-medium hover:bg-primary/90 transition-colors">Register</button>
    </form>
    <p class="mt-4 text-center text-sm text-muted-foreground">Already have an account? <a href="/login" class="text-foreground underline underline-offset-4 hover:text-foreground/80">Login</a></p>
  </div>
</div>
{% endblock %}
