<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}light-sentry{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2318181b'/%3E%3Ccircle cx='16' cy='9' r='2.5' fill='%23fafafa'/%3E%3Cpath d='M16 6.5L9 10l7-1.5 7 1.5z' fill='%23fafafa' opacity='.4'/%3E%3Crect x='14' y='11.5' width='4' height='2' rx='.5' fill='%23d4d4d8'/%3E%3Cpath d='M14.5 13.5h3l.75 11h-4.5z' fill='%23a1a1aa'/%3E%3Crect x='12.5' y='24.5' width='7' height='1.5' rx='.75' fill='%2371717a'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b',
            foreground: '#fafafa',
            card: '#09090b',
            'card-foreground': '#fafafa',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            border: '#27272a',
            input: '#27272a',
            primary: '#fafafa',
            'primary-foreground': '#18181b',
            secondary: '#27272a',
            'secondary-foreground': '#fafafa',
            accent: '#27272a',
            'accent-foreground': '#fafafa',
            ring: '#d4d4d8',
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-background text-foreground min-h-screen antialiased">
  {% block nav %}
  <nav class="border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <a href="/projects" class="text-sm font-semibold tracking-tight text-foreground hover:text-foreground/80">light-sentry</a>
      <div class="flex items-center gap-4">
        <a href="/projects" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Projects</a>
        <form method="post" action="/logout">
          <button type="submit" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Logout</button>
        </form>
      </div>
    </div>
  </nav>
  {% endblock %}
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
